# Growmerce Supabase config (Real Intelligence System).
# Minimal config for the submit-report-request Edge Function.

project_id = "growmerce"

[functions.create-upload-url]
# Public, controlled-demo endpoint: returns a signed upload URL for the private
# report-uploads bucket. Service-role used server-side only; no public storage policy.
verify_jwt = false

[functions.submit-report-request]
# Public, controlled-demo submission endpoint: the frontend calls it with the
# anon key but no end-user session, so JWT verification is disabled here. The
# function does its OWN validation and writes with the service-role key
# (server-side secret). Do NOT enable verify_jwt until end-user auth exists.
verify_jwt = false

# --- Internal/admin functions (Real Intelligence pipeline) ---
# These are NOT called by the public site. They run with the service-role key.
# verify_jwt=false keeps them callable by tooling/cron; protect them with a
# secret / allow-list / network rules before any real launch.
[functions.build-evidence]
verify_jwt = false

[functions.compose-report]
verify_jwt = false

[functions.review-report]
verify_jwt = false

[functions.run-daily-snapshot]
verify_jwt = false

[functions.run-real-intelligence-pipeline]
verify_jwt = false
